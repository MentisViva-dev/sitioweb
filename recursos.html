  <!-- Banner -->

    <div class="hero-decoration" style="width:300px;height:300px;top:-80px;right:-60px;" aria-hidden="true"></div>

  <!-- Resources Grid -->
  <section class="recursos-section">
    <div class="container">
      <div class="section-header fade-in">
        <span class="section-label">Contenido</span>
        <h2>Explora nuestros recursos</h2>
        <p>Material seleccionado por nuestro equipo de profesionales para tu desarrollo.</p>
      </div>
      <div class="recursos-filters" id="recursosFilters" role="group" aria-label="Filtrar recursos por categoría">
        <button class="filter-btn active" type="button" data-filter="all" aria-pressed="true">Todos</button>
      </div>
      <div class="recursos-grid stagger-children" id="recursosGrid">
        <!-- Rendered by JS -->
      </div>
      <div class="no-recursos" id="noRecursos" style="display:none">
        <i class="fa-solid fa-book-open"></i>
        <p>Pronto publicaremos contenido aqu&iacute;.</p>
      </div>
    </div>
  </section>
  </main>

  <!-- Footer -->
  <footer class="footer" id="footer"></footer>

  <script src="js/content.js?v=20260504h"></script>
  <script src="js/main.js?v=20260504h"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await ContentManager.init();
      ContentManager.renderNavbar('recursos.html');
      ContentManager.renderFooter();

      const recursos = ContentManager.get('recursos');
      if (recursos) {
        // Banner
        document.getElementById('bannerTitle').textContent = recursos.banner?.titulo || 'Recursos';
        document.getElementById('bannerSubtitle').textContent = recursos.banner?.subtitulo || '';
        const bannerEl = document.getElementById('recursosBanner');
        if (recursos.banner?.backgroundImage) {
          // Preload el banner para que el navegador lo descargue ASAP (above-the-fold)
          const link = document.createElement('link');
          link.rel = 'preload';
          link.as = 'image';
          link.href = recursos.banner.backgroundImage;
          link.fetchPriority = 'high';
          document.head.appendChild(link);
          bannerEl.style.backgroundImage = `url('${recursos.banner.backgroundImage}')`;
        }
        if (recursos.banner?.overlayOpacity != null) {
          bannerEl.style.setProperty('--overlay-opacity', recursos.banner.overlayOpacity / 100);
        }

        // Build category filters
        const items = recursos.items || [];
        const categories = [...new Set(items.map(i => i.categoria).filter(Boolean))];
        const filtersEl = document.getElementById('recursosFilters');
        if (categories.length > 0) {
          filtersEl.innerHTML = '<button class="filter-btn active" type="button" data-filter="all" aria-pressed="true">Todos</button>' +
            categories.map(c => `<button class="filter-btn" type="button" data-filter="${c}" aria-pressed="false">${c}</button>`).join('');
        }

        // Render items
        const grid = document.getElementById('recursosGrid');
        if (items.length === 0) {
          grid.style.display = 'none';
          document.getElementById('noRecursos').style.display = '';
        } else {
          grid.innerHTML = items.map(item => `
            <article class="recurso-card fade-in" data-cat="${item.categoria || ''}">
              <div class="recurso-image">
                ${item.imagen ? `<img src="${item.imagen}" alt="${item.titulo}" loading="lazy" decoding="async">` : '<i class="fa-solid fa-file-lines recurso-placeholder"></i>'}
              </div>
              <div class="recurso-body">
                <span class="recurso-cat">${item.categoria || 'General'}</span>
                <h3>${item.titulo}</h3>
                <div class="recurso-desc">${(item.descripcion || '').replace(/\n/g, '<br>')}</div>
                ${item.fecha ? `<span class="recurso-date"><i class="fa-solid fa-calendar"></i> ${new Date(item.fecha + 'T12:00:00').toLocaleDateString('es-CL', {year:'numeric',month:'long',day:'numeric'})}</span>` : ''}
                ${item.url ? `<a href="${item.url}" target="_blank" rel="noopener noreferrer" class="recurso-link">Descubrir <i class="fa-solid fa-arrow-right" aria-hidden="true"></i><span class="sr-only"> (se abre en nueva pestaña)</span></a>` : ''}
              </div>
            </article>
          `).join('');
        }

        // Filter logic
        filtersEl.addEventListener('click', (e) => {
          if (!e.target.classList.contains('filter-btn')) return;
          filtersEl.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('active');
            b.setAttribute('aria-pressed', 'false');
          });
          e.target.classList.add('active');
          e.target.setAttribute('aria-pressed', 'true');
          const filter = e.target.dataset.filter;
          grid.querySelectorAll('.recurso-card').forEach(card => {
            card.style.display = (filter === 'all' || card.dataset.cat === filter) ? '' : 'none';
          });
        });
      } else {
        document.getElementById('recursosGrid').style.display = 'none';
        document.getElementById('noRecursos').style.display = '';
      }

      initScrollAnimations();
    });
  </script>
