  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css?v=20260504d">
  <style>
    .terminos-section { padding: 120px 0 80px; }
    .terminos-section h1 { margin-bottom: 30px; }
    .terminos-content { max-width: 800px; margin: 0 auto; }
    .terminos-content h2 { font-size: 1.3rem; margin: 30px 0 12px; color: var(--teal); }
    .terminos-content p, .terminos-content li { font-size: 0.98rem; line-height: 1.8; color: var(--text-secondary); margin-bottom: 12px; }
    .terminos-content ul { padding-left: 24px; list-style: disc; }

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LW9MH65Z3N"></script>

</head>
<body>

  <a class="skip-link" href="#mainContent">Saltar al contenido principal</a>

  <header class="navbar" id="navbar"></header>

  <main id="mainContent" tabindex="-1">
  <section class="terminos-section">
    <div class="container">
      <div class="terminos-content">
        <h1 id="terminosTitle">T&eacute;rminos y Condiciones</h1>
        <p class="terminos-date" id="terminosDate"></p>
        <div id="terminosBody">
          <p>Cargando...</p>
        </div>
      </div>
    </div>
  </section>
  </main>

  <footer class="footer" id="footer"></footer>

  <script src="js/content.js?v=20260504d"></script>
  <script src="js/main.js?v=20260504d"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await ContentManager.init();
      ContentManager.renderNavbar('terminos.html');
      ContentManager.renderFooter();

      const terminos = ContentManager.get('terminos');
      if (terminos) {
        document.getElementById('terminosTitle').textContent = terminos.titulo || 'T\u00e9rminos y Condiciones';
        document.getElementById('terminosDate').textContent = terminos.fecha ? 'Actualizado: ' + terminos.fecha : '';
        document.getElementById('terminosBody').innerHTML = terminos.contenido || '<p>Sin contenido a\u00fan.</p>';
      } else {
        document.getElementById('terminosBody').innerHTML = '<p>Sin contenido a\u00fan. Ed\u00edtalo desde el CMS.</p>';
      }

      initScrollAnimations();
    });
  </script>

</body>
</html>
