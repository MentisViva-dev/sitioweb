name: Apply D1 migrations (one-shot)

# Aplica migraciones aditivas a la BD remota.
# Usado para 0003_session_generation.sql y 0004_audit_log_ttl.sql.
#
# Tras éxito borrar este archivo (es one-shot por convención del proyecto:
# las migraciones aditivas se aplican una vez por feature, no por deploy).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribir "APPLY" para confirmar la aplicación a producción'
        required: true

jobs:
  migrate:
    if: github.event.inputs.confirm == 'APPLY'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Apply 0003_session_generation.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # ALTER TABLE ADD COLUMN no es idempotente — si la column ya existe
        # falla con "duplicate column name". Se permite continuar.
        continue-on-error: true
        run: |
          wrangler d1 execute mentisviva --remote --file=migrations/0003_session_generation.sql

      - name: Apply 0004_audit_log_ttl.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler d1 execute mentisviva --remote --file=migrations/0004_audit_log_ttl.sql

      - name: Verify columns
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Verifying mv_users.session_generation:"
          wrangler d1 execute mentisviva --remote --command="SELECT name FROM pragma_table_info('mv_users') WHERE name='session_generation'"
          echo "Verifying mv_admins.session_generation:"
          wrangler d1 execute mentisviva --remote --command="SELECT name FROM pragma_table_info('mv_admins') WHERE name='session_generation'"
          echo "Verifying idx_audit_created_at:"
          wrangler d1 execute mentisviva --remote --command="SELECT name FROM sqlite_master WHERE type='index' AND name='idx_audit_created_at'"
