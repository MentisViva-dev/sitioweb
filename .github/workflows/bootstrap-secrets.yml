name: Bootstrap Secrets (one-time)

# Workflow ÚNICO para cargar GitHub Actions Secrets de Cloudflare
# usando el GITHUB_TOKEN automático (que tiene permisos de Secrets).
#
# CÓMO USAR:
# 1. Ve a Actions → "Bootstrap Secrets" → "Run workflow"
# 2. En "cf_token" ingresa tu Cloudflare API Token (lo verá GitHub solo,
#    no queda en logs porque es input "secret")
# 3. Run workflow → carga CLOUDFLARE_API_TOKEN y CLOUDFLARE_ACCOUNT_ID
# 4. BORRA este workflow después: edit → delete file → commit
#
# A partir de ahí, deploy.yml se ejecuta solo en cada push.

on:
  workflow_dispatch:
    inputs:
      cf_token:
        description: 'Cloudflare API Token (NO se loguea, no queda en historial)'
        required: true
        type: string
      cf_account_id:
        description: 'Cloudflare Account ID'
        required: true
        default: '181a71f5927b646cd246af58a129a953'

permissions:
  contents: read
  actions: write       # crear secrets

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gh CLI (preinstalado en runners)
        run: gh --version

      - name: Set CLOUDFLARE_API_TOKEN secret
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CF_TOKEN: ${{ inputs.cf_token }}
        run: |
          echo -n "$CF_TOKEN" | gh secret set CLOUDFLARE_API_TOKEN --repo "$GITHUB_REPOSITORY"
          echo "✅ CLOUDFLARE_API_TOKEN set"

      - name: Set CLOUDFLARE_ACCOUNT_ID secret
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CF_ACC: ${{ inputs.cf_account_id }}
        run: |
          echo -n "$CF_ACC" | gh secret set CLOUDFLARE_ACCOUNT_ID --repo "$GITHUB_REPOSITORY"
          echo "✅ CLOUDFLARE_ACCOUNT_ID set"

      - name: Verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Secrets ahora disponibles:"
          gh secret list --repo "$GITHUB_REPOSITORY"
          echo ""
          echo "✅ Todo listo. Borra este workflow ahora:"
          echo "   .github/workflows/bootstrap-secrets.yml"
          echo "Cada futuro 'git push' a main desplegará automáticamente."
