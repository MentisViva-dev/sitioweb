name: Fix Admin Hash via SQL file (one-shot)

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write SQL file (avoids all shell escaping issues)
        run: |
          mkdir -p /tmp/sql
          cat > /tmp/sql/fix-admin.sql <<'EOF'
          UPDATE mv_admins
          SET username = 'unidosporcristo',
              email = 'contacto@mentisviva.cl',
              password_hash = 'pbkdf2$sha256$100000$/jECYWVMkHgNYMyPubKM+g==$YwThoWycYHPQ+iCBgwibYfE+Wl4wBMqDVqJddGIMVLM=',
              role = 'superadmin',
              active = 1
          WHERE id = 1;
          EOF
          echo "--- SQL file content ---"
          cat /tmp/sql/fix-admin.sql

      - name: Apply SQL via wrangler --file
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute mentisviva --remote --file=/tmp/sql/fix-admin.sql

      - name: Verify hash format
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute mentisviva --remote --json --command "SELECT id, username, substr(password_hash, 1, 30) AS hash_prefix, length(password_hash) AS hash_len FROM mv_admins"

      - name: Clear KV rate limit (in case there was a lockout)
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: kv key delete --namespace-id=5e7c1e001cd84248bf31323afd65118b "ratelimit:admin:0.0.0.0"
