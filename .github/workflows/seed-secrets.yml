name: Seed Cloudflare Secrets

# Workflow manual para cargar todos los secrets necesarios al Worker
# desde GitHub Secrets. Correr UNA vez después de configurar todos los
# GitHub Secrets en Settings → Secrets → Actions.

on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Push secrets to Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ENV_FLAG: ${{ github.event.inputs.env == 'staging' && '--env staging' || '' }}
        run: |
          set -e
          echo "Pushing secrets to ${ENV_FLAG:-production}..."

          push() {
            local NAME="$1"; local VALUE="$2"
            if [ -z "$VALUE" ]; then
              echo "⚠️  Skipping $NAME (empty)"
              return
            fi
            echo "$VALUE" | wrangler secret put $NAME $ENV_FLAG
          }

          push MV_TOKEN_SECRET     "${{ secrets.MV_TOKEN_SECRET }}"
          push MV_FLOW_API_KEY     "${{ secrets.MV_FLOW_API_KEY }}"
          push MV_FLOW_SECRET      "${{ secrets.MV_FLOW_SECRET }}"
          push MV_RECAPTCHA_SECRET "${{ secrets.MV_RECAPTCHA_SECRET }}"
          push MV_RESEND_KEY       "${{ secrets.MV_RESEND_KEY }}"
          push MV_SHIPIT_TOKEN     "${{ secrets.MV_SHIPIT_TOKEN }}"
          push MV_SHIPIT_EMAIL     "${{ secrets.MV_SHIPIT_EMAIL }}"
          push MV_CRON_SECRET      "${{ secrets.MV_CRON_SECRET }}"
          push MV_FORWARD_SECRET   "${{ secrets.MV_FORWARD_SECRET }}"

          echo "✅ Secrets seeded"
