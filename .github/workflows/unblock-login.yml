name: Unblock Login Rate Limit (one-shot)

on:
  workflow_dispatch:

jobs:
  unblock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List all rl:login_* keys
        id: list
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: kv key list --namespace-id=5e7c1e001cd84248bf31323afd65118b --prefix=rl:login

      - name: Delete by IP and by username (best-effort)
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: kv key delete --namespace-id=5e7c1e001cd84248bf31323afd65118b "rl:login_email:unidosporcristo"

      - name: Delete legacy 'admin' email key (just in case)
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: kv key delete --namespace-id=5e7c1e001cd84248bf31323afd65118b "rl:login_email:admin"

      - name: Bulk-delete all rl:login_ip:* keys via wrangler kv bulk
        continue-on-error: true
        run: |
          # Lista todas las keys con prefijo rl:login_ip y las borra una a una
          npx wrangler kv key list --namespace-id=5e7c1e001cd84248bf31323afd65118b --prefix=rl:login_ip > /tmp/keys.json 2>&1 || true
          cat /tmp/keys.json
          if [ -s /tmp/keys.json ]; then
            python3 - <<'PY' > /tmp/key_names.txt
          import json
          with open('/tmp/keys.json') as f:
              # wrangler output puede tener JSON o texto; intentar JSON
              content = f.read()
              try:
                  data = json.loads(content)
                  for k in data:
                      print(k.get('name', k))
              except Exception:
                  pass
          PY
            cat /tmp/key_names.txt
            while IFS= read -r key; do
              [ -z "$key" ] && continue
              echo "Deleting: $key"
              npx wrangler kv key delete --namespace-id=5e7c1e001cd84248bf31323afd65118b "$key" || true
            done < /tmp/key_names.txt
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Confirm cleanup
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: kv key list --namespace-id=5e7c1e001cd84248bf31323afd65118b --prefix=rl:login
