name: Deploy to Cloudflare Pages

on:
  push:
    branches: [pages-site]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy static site to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON content
        run: |
          node -e "JSON.parse(require('fs').readFileSync('data/content.json','utf8')); console.log('content.json OK')"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=mentisviva-web --branch=main --commit-dirty=true

      - name: Notify deploy success
        if: success()
        run: echo "Pages deploy successful — https://mentisviva.cl"

      - name: Notify deploy failure
        if: failure()
        run: echo "Pages deploy failed"
