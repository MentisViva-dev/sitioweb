name: Update Admin Credentials (one-shot)

# Workflow de un solo uso para resetear las credenciales del admin.
# Después de ejecutarlo y verificar el login, este archivo debe eliminarse.

on:
  workflow_dispatch:

jobs:
  update:
    name: Update mv_admins row
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show current admin row (sin hash)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute mentisviva --remote --command "SELECT id, username, email, role, active, last_login_at FROM mv_admins"

      - name: Update admin to unidosporcristo / new password
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Hash PBKDF2-SHA256, 100k iter, generado para 'seamossalyluzdelmundo2026'
          command: |
            d1 execute mentisviva --remote --command "UPDATE mv_admins SET username='unidosporcristo', email='contacto@mentisviva.cl', password_hash='pbkdf2\$sha256\$100000\$/jECYWVMkHgNYMyPubKM+g==\$YwThoWycYHPQ+iCBgwibYfE+Wl4wBMqDVqJddGIMVLM=', active=1 WHERE id=1; INSERT OR IGNORE INTO mv_admins (username, email, password_hash, role, active) VALUES ('unidosporcristo', 'contacto@mentisviva.cl', 'pbkdf2\$sha256\$100000\$/jECYWVMkHgNYMyPubKM+g==\$YwThoWycYHPQ+iCBgwibYfE+Wl4wBMqDVqJddGIMVLM=', 'superadmin', 1);"

      - name: Verify update
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute mentisviva --remote --command "SELECT id, username, email, role, active FROM mv_admins"

      - name: Clear admin rate limit cache (KV)
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: kv key list --namespace-id=5e7c1e001cd84248bf31323afd65118b --prefix="ratelimit:admin:"
